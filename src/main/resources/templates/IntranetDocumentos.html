<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Documentos — Intranet Mardique</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/panel-nav.css">
    <link rel="stylesheet" href="/css/inicio.css">
    <link rel="stylesheet" href="/css/portal.css">
    <script src="https://alcdn.msauth.net/browser/2.38.0/js/msal-browser.min.js"></script>
    <style>
        .intranet-toast{display:none;position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:12px 24px;border-radius:var(--r);font-size:13px;font-weight:600;z-index:9999;box-shadow:0 8px 32px rgba(0,0,0,.15);max-width:90%;text-align:center;}
        .intranet-toast.success{background:#16a34a;color:#fff;}
        .intranet-toast.error{background:#dc2626;color:#fff;}
        @keyframes fadeInDown{from{opacity:0;transform:translateY(-24px)}to{opacity:1;transform:translateY(0)}}
        @keyframes fadeInUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
        @keyframes floatIcon{0%,100%{transform:translateY(0)}25%{transform:translateY(-12px)}75%{transform:translateY(-8px)}}
        .phero-badge{animation:fadeInDown .6s ease both}
        .phero-main h1{animation:fadeInUp .7s ease .1s both}
        .phero-main p{animation:fadeInUp .7s ease .25s both}
        .phero-floaters{position:absolute;inset:0;overflow:hidden;pointer-events:none;z-index:0}
        .phero-floaters i{position:absolute;color:rgba(255,255,255,.08);animation:floatIcon 9s ease-in-out infinite}
        body{background:#f3f4f6!important;}
        .intranet-shell{max-width:1320px;margin:0 auto;padding:0 24px 90px;display:flex;flex-direction:column;gap:22px;}
        .intranet-main{flex:1;min-width:0;}
        body .tab-content{background:#fff;border:1px solid var(--bdr);border-radius:16px;padding:34px 36px;box-shadow:0 4px 22px rgba(15,42,58,.06);}
        @media(max-width:700px){body .tab-content{padding:22px 18px;}}
        .doc-sector-tabs{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap;}
        .doc-sector-tab{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;border-radius:50px;font-size:12px;font-weight:700;font-family:inherit;border:2px solid var(--bdr);background:#fff;color:var(--tx);cursor:pointer;transition:all .2s ease;}
        .doc-sector-tab:hover{border-color:var(--ag);color:var(--ag);}
        .doc-sector-tab.active{background:var(--pd);border-color:var(--pd);color:#fff;}
        .doc-sector-tab i{font-size:13px;opacity:.7;}
        .doc-sector-tab.active i{opacity:1;}
        .doc-sector-tab .tab-count{display:inline-flex;align-items:center;justify-content:center;min-width:20px;height:20px;border-radius:50px;font-size:10px;font-weight:800;padding:0 6px;background:rgba(0,0,0,.08);color:inherit;}
        .doc-sector-tab.active .tab-count{background:rgba(255,255,255,.2);}
        .doc-summary{display:flex;gap:24px;padding:14px 0;margin-bottom:20px;border-bottom:1px solid #eef1f4;flex-wrap:wrap;}
        .doc-summary-item{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--mx);}
        .doc-summary-item strong{color:var(--pd);font-size:14px;}
        .doc-summary-item i{color:var(--ag);font-size:14px;}
        .doc-breadcrumb{font-size:12.5px;color:var(--mx);margin-bottom:16px;font-weight:600;}
        .doc-breadcrumb .crumb-link{color:var(--ac);cursor:pointer;}
        .doc-breadcrumb .crumb-link:hover{color:var(--ag);}
        .doc-breadcrumb .crumb-current{color:var(--pd);font-weight:800;}
        .doc-breadcrumb .crumb-sep{color:#d0d5dd;margin:0 4px;}
        .doc-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:56px 20px;color:var(--mx);background:#f9fafb;border:1px dashed var(--bdr);border-radius:12px;}
        .doc-empty i{font-size:36px;margin-bottom:12px;opacity:.4;color:var(--pd);}
        .doc-empty span{font-size:13px;font-weight:600;}
        .intranet-loading{display:flex;align-items:center;justify-content:center;gap:10px;padding:48px 20px;color:var(--mx);font-size:13px;font-weight:600;}
        .doc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px;}
        .doc-card{background:#fff;border:1px solid var(--bdr);border-radius:12px;padding:16px;cursor:pointer;transition:all .25s ease;position:relative;overflow:hidden;}
        .doc-card:hover{border-color:var(--ag);box-shadow:0 8px 24px rgba(15,42,58,.1);transform:translateY(-2px);}
        .doc-card-folder{border-left:4px solid #f09a36;}
        .doc-card-file{border-left:4px solid #28648c;}
        .doc-card-icon{width:44px;height:44px;display:flex;align-items:center;justify-content:center;font-size:18px;border-radius:10px;margin-bottom:12px;}
        .doc-card-folder .doc-card-icon{background:rgba(240,154,54,.1);color:#f09a36;}
        .doc-card-file .doc-card-icon{background:rgba(40,100,140,.08);color:#28648c;}
        .doc-card-name{font-size:13.5px;font-weight:700;color:var(--pd);line-height:1.3;margin-bottom:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
        .doc-card-meta{font-size:11px;color:var(--mx);display:flex;flex-direction:column;gap:2px;}
        .doc-card-meta span{display:flex;align-items:center;gap:4px;}
        .mock-mode-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 14px;border-radius:50px;font-size:11px;font-weight:700;background:#fef3c7;color:#92400e;border:1px solid #f59e0b;margin-left:10px;}
        .user-greeting{font-size:15px;color:rgba(255,255,255,.75);margin-top:4px;}
        .user-badge{display:inline-block;padding:3px 12px;border-radius:50px;font-size:11px;font-weight:700;background:rgba(240,154,54,.14);color:var(--ag);border:1px solid rgba(240,154,54,.3);margin-top:8px;}
        @media(max-width:768px){.header-user-name{display:none;}}
    </style>
</head>
<body>

<div id="intranet-toast" class="intranet-toast"></div>

<div th:replace="IntranetNav :: nav(current='documentos')"></div>

<div class="phero">
    <div class="phw-glow"></div>
    <div class="phero-floaters">
        <i class="fas fa-file-pdf"></i>
        <i class="fas fa-file-word"></i>
        <i class="fas fa-file-excel"></i>
        <i class="fas fa-folder-open"></i>
    </div>
    <div class="phw-container">
        <div class="phero-grid">
            <div class="phero-main">
                <div class="phero-badge"><i class="fas fa-folder-open"></i> Repositorio Documental</div>
                <h1>Documentos</h1>
                <p>Documentos organizados por sector de la empresa</p>
            </div>
        </div>
    </div>
    <div class="phw-wave">
        <svg viewBox="0 0 1440 60" preserveAspectRatio="none"><path d="M0,32 C240,60 480,4 720,20 C960,36 1200,58 1440,28 L1440,60 L0,60 Z" fill="#f0f4f8"/></svg>
    </div>
</div>

<div class="intranet-shell">
    <div class="intranet-main">
        <div class="tab-content reveal">
            <div class="doc-sector-tabs" id="sectorTabs"></div>
            <div class="doc-summary" id="docSummary"></div>
            <div class="doc-breadcrumb" id="doc-breadcrumb">
                <span class="crumb-current">Documentos</span>
            </div>
            <div id="documents-container"></div>
        </div>
    </div>
</div>

<div class="pfooter">
    &copy; 2026 Sociedad Portuaria Mardique S.A. Intranet Corporativa &mdash; Todos los derechos reservados.
</div>

<script src="/js/msal-config.js"></script>
<script src="/js/intranet.js"></script>
<script>
const SECTORS = [
    { id: "todos", name: "Todos", icon: "fa-folder-open" },
    { id: "rrhh", name: "Recursos Humanos", icon: "fa-users" },
    { id: "finanzas", name: "Finanzas", icon: "fa-chart-line" },
    { id: "ti", name: "Tecnología e Informática", icon: "fa-laptop-code" }
];

let currentSector = "todos";
let currentFolderId = null;
let docBreadcrumbState = [{ id: "root", name: "Documentos" }];

function selectSector(sectorId){
    currentSector = sectorId;
    currentFolderId = null;
    docBreadcrumbState = [{ id: "root", name: "Documentos" }];
    document.querySelectorAll(".doc-sector-tab").forEach(t => t.classList.toggle("active", t.dataset.id === sectorId));
    loadDocs();
}

function loadDocs(){
    const cont = document.getElementById("documents-container");
    if (!cont) return;
    cont.innerHTML = '<div class="intranet-loading"><i class="fas fa-spinner fa-spin"></i><span>Cargando documentos...</span></div>';
    if (currentSector === "todos") {
        getDriveRoot().then(items => {
            renderSectorCards(items);
        }).catch(() => { cont.innerHTML = '<div class="doc-empty"><i class="fas fa-exclamation-triangle"></i><span>Error al cargar</span></div>'; });
    } else {
        getDriveItems(currentSector).then(items => {
            renderDocGrid(items);
        }).catch(() => { cont.innerHTML = '<div class="doc-empty"><i class="fas fa-exclamation-triangle"></i><span>Error al cargar</span></div>'; });
    }
}

function renderSectorCards(sectors){
    const cont = document.getElementById("documents-container");
    if (!cont) return;
    if (!sectors || !sectors.length) {
        cont.innerHTML = '<div class="doc-empty"><i class="fas fa-folder-open"></i><span>No hay sectores disponibles</span></div>';
        return;
    }
    const html = '<div class="doc-grid">' + sectors.map(s => {
        const dept = MOCK_DEPARTMENTS.find(d => d.id === s.id);
        const icon = dept?.icon || "fa-folder";
        const count = s.folder?.childCount || 0;
        return '<div class="doc-card doc-card-folder" onclick="openSector(\'' + s.id + '\')">' +
            '<div class="doc-card-icon"><i class="fas ' + icon + '"></i></div>' +
            '<div class="doc-card-name">' + escapeHtml(s.name || dept?.name || "") + '</div>' +
            '<div class="doc-card-meta"><span><i class="far fa-file"></i> ' + count + ' documentos</span></div>' +
        '</div>';
    }).join("") + '</div>';
    cont.innerHTML = html;
}

function openSector(id){
    currentSector = id;
    currentFolderId = null;
    docBreadcrumbState.push({ id, name: MOCK_DEPARTMENTS.find(d => d.id === id)?.name || id });
    renderBreadcrumb();
    document.querySelectorAll(".doc-sector-tab").forEach(t => t.classList.toggle("active", t.dataset.id === id));
    const cont = document.getElementById("documents-container");
    cont.innerHTML = '<div class="intranet-loading"><i class="fas fa-spinner fa-spin"></i><span>Cargando documentos...</span></div>';
    getDriveItems(id).then(items => renderDocGrid(items)).catch(() => {});
}

function renderDocGrid(items){
    const cont = document.getElementById("documents-container");
    if (!cont) return;
    if (!items || !items.length) {
        cont.innerHTML = '<div class="doc-empty"><i class="fas fa-folder-open"></i><span>No hay documentos en este sector</span></div>';
        return;
    }
    cont.innerHTML = '<div class="doc-grid">' + items.map(item => {
        const isFolder = item.folder;
        const icon = isFolder ? "fa-folder" : getFileIcon(item.name);
        const iconColor = isFolder ? "doc-card-folder" : "doc-card-file";
        const meta = isFolder
            ? '<span><i class="far fa-folder"></i> ' + (item.folder?.childCount || 0) + ' elementos</span>'
            : '<span><i class="far fa-file"></i> ' + formatFileSize(item.size) + '</span><span><i class="far fa-calendar-alt"></i> ' + formatDate(item.lastModifiedDateTime) + '</span>';
        return '<div class="doc-card ' + iconColor + '" onclick="openDocItem(\'' + item.id + '\',' + isFolder + ')">' +
            '<div class="doc-card-icon"><i class="fas ' + icon + '"></i></div>' +
            '<div class="doc-card-name">' + escapeHtml(item.name) + '</div>' +
            '<div class="doc-card-meta">' + meta + '</div>' +
        '</div>';
    }).join("") + '</div>';
}

function openDocItem(id, isFolder){
    if (isFolder) {
        docBreadcrumbState.push({ id, name: "..." });
        renderBreadcrumb();
        const cont = document.getElementById("documents-container");
        cont.innerHTML = '<div class="intranet-loading"><i class="fas fa-spinner fa-spin"></i><span>Cargando...</span></div>';
        getDriveItems(id).then(items => renderDocGrid(items)).catch(() => {});
    } else {
        window.open("#", "_blank");
    }
}

function renderBreadcrumb(){
    const el = document.getElementById("doc-breadcrumb");
    if (!el) return;
    if (docBreadcrumbState.length <= 1 && currentSector !== "todos") {
        const sector = SECTORS.find(s => s.id === currentSector);
        if (sector) {
            el.innerHTML = '<span class="crumb-link" onclick="goToRoot()">Documentos</span> <span class="crumb-sep">/</span> <span class="crumb-current">' + sector.name + '</span>';
            return;
        }
    }
    el.innerHTML = docBreadcrumbState.map((b, i) => {
        if (i === docBreadcrumbState.length - 1) return '<span class="crumb-current">' + escapeHtml(b.name) + '</span>';
        return '<span class="crumb-link" onclick="goToCrumb(' + i + ')">' + escapeHtml(b.name) + '</span> <span class="crumb-sep">/</span> ';
    }).join("");
}

function goToRoot(){
    docBreadcrumbState = [{ id: "root", name: "Documentos" }];
    currentSector = "todos";
    currentFolderId = null;
    document.querySelectorAll(".doc-sector-tab").forEach(t => t.classList.toggle("active", t.dataset.id === "todos"));
    renderBreadcrumb();
    loadDocs();
}

function goToCrumb(idx){
    docBreadcrumbState = docBreadcrumbState.slice(0, idx + 1);
    renderBreadcrumb();
    if (idx === 0) { currentSector = "todos"; loadDocs(); }
}

function renderTabs(){
    const tabs = document.getElementById("sectorTabs");
    if (!tabs) return;
    tabs.innerHTML = SECTORS.map(s => {
        let count = "";
        if (s.id !== "todos") {
            const files = MOCK_FILES_BY_SECTOR[s.id];
            count = files ? files.length : 0;
        }
        return '<button class="doc-sector-tab' + (s.id === currentSector ? ' active' : '') + '" data-id="' + s.id + '" onclick="selectSector(\'' + s.id + '\')">' +
            '<i class="fas ' + s.icon + '"></i> ' + s.name +
            (count !== "" ? ' <span class="tab-count">' + count + '</span>' : '') +
        '</button>';
    }).join("");
}

function renderSummary(){
    const el = document.getElementById("docSummary");
    if (!el) return;
    let totalFiles = 0, totalFolders = 0;
    SECTORS.filter(s => s.id !== "todos").forEach(s => {
        const files = MOCK_FILES_BY_SECTOR[s.id] || [];
        files.forEach(f => { if (f.folder) totalFolders++; else totalFiles++; });
    });
    el.innerHTML = '<div class="doc-summary-item"><i class="fas fa-file"></i> <strong>' + totalFiles + '</strong> Archivos</div>' +
        '<div class="doc-summary-item"><i class="fas fa-folder"></i> <strong>' + totalFolders + '</strong> Carpetas</div>' +
        '<div class="doc-summary-item"><i class="fas fa-layer-group"></i> <strong>' + (SECTORS.length - 1) + '</strong> Sectores</div>';
}

document.addEventListener("DOMContentLoaded", function() {
    if (!isMsalAuthenticated()) { window.location.href = "/login"; return; }
    if (isMockMode()) { const mb = document.getElementById("mockBadge"); if (mb) mb.style.display = "inline-flex"; }

    getCurrentUser().then(user => {
        const name = user.displayName || user.userPrincipalName || "Empleado";
        document.getElementById("userDisplay").textContent = name;
        const dept = user.department || user.officeLocation || "";
        if (dept) {
            const deptLower = dept.toLowerCase();
            const sectorMap = { "tecnología e informática": "ti", "ti": "ti", "recursos humanos": "rrhh", "rrhh": "rrhh", "finanzas": "finanzas" };
            const matched = Object.entries(sectorMap).find(([key]) => deptLower.includes(key));
            if (matched) currentSector = matched[1];
        }
    }).catch(() => {});

    renderTabs();
    renderSummary();
    loadDocs();

    const hdr = document.getElementById('intranet-header');
    window.addEventListener('scroll', () => hdr?.classList.toggle('scrolled', window.scrollY > 60), { passive: true });

    const revealObs = new IntersectionObserver(entries => {
        entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
    }, { threshold: 0.1 });
    document.querySelectorAll('.reveal').forEach(el => revealObs.observe(el));
});
</script>
</body>
</html>
