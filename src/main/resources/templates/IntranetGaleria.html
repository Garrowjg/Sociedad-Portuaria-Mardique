<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galería — Intranet Mardique</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/panel-nav.css">
    <link rel="stylesheet" href="/css/inicio.css">
    <link rel="stylesheet" href="/css/portal.css">
    <script src="https://alcdn.msauth.net/browser/2.38.0/js/msal-browser.min.js"></script>
    <style>
        @keyframes fadeInDown{from{opacity:0;transform:translateY(-24px)}to{opacity:1;transform:translateY(0)}}
        @keyframes fadeInUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
        @keyframes floatIcon{0%,100%{transform:translateY(0)}25%{transform:translateY(-12px)}75%{transform:translateY(-8px)}}
        .phero-badge{animation:fadeInDown .6s ease both}
        .phero-main h1{animation:fadeInUp .7s ease .1s both}
        .phero-main p{animation:fadeInUp .7s ease .25s both}
        .phero-floaters{position:absolute;inset:0;overflow:hidden;pointer-events:none;z-index:0}
        .phero-floaters i{position:absolute;color:rgba(255,255,255,.08);animation:floatIcon 9s ease-in-out infinite}
        .phero-floaters i:nth-child(1){font-size:60px;top:14%;left:6%;animation-delay:0s}
        .phero-floaters i:nth-child(2){font-size:40px;top:62%;left:14%;animation-delay:1.4s}
        .phero-floaters i:nth-child(3){font-size:48px;top:20%;right:8%;animation-delay:.7s}
        .phero-floaters i:nth-child(4){font-size:36px;bottom:12%;right:16%;animation-delay:2.1s}
        body{background:#f3f4f6!important;}
        .intranet-shell{max-width:1320px;margin:0 auto;padding:0 24px 90px;display:flex;flex-direction:column;gap:22px;}
        .intranet-main{flex:1;min-width:0;}
        body .section-header{margin-bottom:24px;padding-bottom:16px;border-bottom:2px solid #eef1f4;}
        body .section-header h2{display:flex;align-items:center;gap:10px;font-size:19px;font-weight:800;color:var(--pd);margin:0;letter-spacing:-.2px;}
        body .section-header h2 i{color:var(--ag);font-size:17px;width:34px;height:34px;flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;background:rgba(240,154,54,.12);border-radius:9px;}
        body .section-header p{margin-top:6px!important;}
        body .tab-content{background:#fff;border:1px solid var(--bdr);border-radius:16px;padding:34px 36px;box-shadow:0 4px 22px rgba(15,42,58,.06);}
        @media(max-width:700px){ body .tab-content{padding:22px 18px;} }
        .gallery-views { position: relative; }
        .gallery-view { display: none; }
        .gallery-view.active { display: block; }
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .gallery-album { background: #fff; border-radius: var(--r); overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,.06); cursor: pointer; transition: transform .25s ease, box-shadow .25s ease; border: 1px solid var(--bdr); }
        .gallery-album:hover { transform: translateY(-4px); box-shadow: 0 8px 30px rgba(0,0,0,.1); }
        .gallery-album-cover { aspect-ratio: 3/2; overflow: hidden; background: var(--bg); }
        .gallery-album-cover img { width: 100%; height: 100%; object-fit: cover; transition: transform .4s ease; }
        .gallery-album:hover .gallery-album-cover img { transform: scale(1.05); }
        .gallery-album-body { padding: 16px; }
        .gallery-album-count { font-size: 11px; font-weight: 600; color: var(--ag); text-transform: uppercase; letter-spacing: .3px; margin-bottom: 4px; }
        .gallery-album-title { font-size: 15px; font-weight: 700; color: var(--pd); margin: 0 0 4px; line-height: 1.3; }
        .gallery-album-date { font-size: 12px; color: var(--mx); margin-bottom: 6px; }
        .gallery-album-desc { font-size: 13px; color: var(--tx); line-height: 1.5; margin: 0 0 12px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .gallery-album-btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 18px; border: none; border-radius: 50px; font-size: 12px; font-weight: 700; font-family: inherit; background: linear-gradient(135deg, var(--ag), #d67e1a); color: #fff; cursor: pointer; transition: all .3s ease; }
        .gallery-album-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(240,154,54,.3); }
        .gallery-detail-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
        .gallery-detail-header h2 { flex: 1; font-size: 18px; font-weight: 700; color: var(--pd); margin: 0; min-width: 200px; }
        .gallery-detail-header .btn-back { display: inline-flex; align-items: center; gap: 6px; padding: 8px 18px; border: 2px solid var(--bdr); border-radius: var(--r); font-size: 12px; font-weight: 700; font-family: inherit; background: #fff; color: var(--tx); cursor: pointer; transition: all .25s ease; }
        .gallery-detail-header .btn-back:hover { border-color: var(--ag); color: var(--ag); }
        .gallery-detail-desc { font-size: 13px; color: var(--mx); margin-bottom: 20px; line-height: 1.6; }
        .gallery-detail-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 12px; }
        .gallery-detail-item { position: relative; aspect-ratio: 4/3; border-radius: calc(var(--r) - 2px); overflow: hidden; cursor: pointer; background: var(--bg); }
        .gallery-detail-item img { width: 100%; height: 100%; object-fit: cover; transition: transform .3s ease; }
        .gallery-detail-item:hover img { transform: scale(1.08); }
        .gallery-detail-overlay { position: absolute; inset: 0; background: rgba(0,0,0,.3); display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity .25s ease; color: #fff; font-size: 22px; }
        .gallery-detail-item:hover .gallery-detail-overlay { opacity: 1; }
        .gallery-preview-modal { display: none; position: fixed; inset: 0; z-index: 10000; background: rgba(0,0,0,.92); align-items: center; justify-content: center; padding: 40px; }
        .gallery-preview-modal.active { display: flex; }
        .gallery-preview-modal img { max-width: 95%; max-height: 85vh; object-fit: contain; border-radius: 6px; box-shadow: 0 8px 40px rgba(0,0,0,.4); }
        .gallery-preview-close { position: absolute; top: 20px; right: 24px; background: none; border: none; color: #fff; font-size: 32px; cursor: pointer; opacity: .7; transition: opacity .2s; z-index: 1; }
        .gallery-preview-close:hover { opacity: 1; }
        .gallery-preview-caption { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,.7); font-size: 13px; text-align: center; background: rgba(0,0,0,.5); padding: 6px 18px; border-radius: 50px; max-width: 80%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .mock-mode-badge { display: inline-flex; align-items: center; gap: 5px; padding: 4px 14px; border-radius: 50px; font-size: 11px; font-weight: 700; background: #fef3c7; color: #92400e; border: 1px solid #f59e0b; margin-left: 10px; }
        .user-greeting{font-size:15px;color:rgba(255,255,255,.75);margin-top:4px;}
        .user-badge{display:inline-block;padding:3px 12px;border-radius:50px;font-size:11px;font-weight:700;background:rgba(240,154,54,.14);color:var(--ag);border:1px solid rgba(240,154,54,.3);margin-top:8px;}
        @media(max-width:768px){ .header-user-name{display:none;} }
    </style>
</head>
<body>

<div id="gallery-preview-modal" class="gallery-preview-modal" onclick="closeGalleryPreview()">
    <button class="gallery-preview-close" onclick="event.stopPropagation();closeGalleryPreview()">&times;</button>
    <img class="gallery-preview-img" src="" alt="Vista previa" onclick="event.stopPropagation()">
    <div class="gallery-preview-caption"></div>
</div>

<div th:replace="IntranetNav :: nav(current='galeria')"></div>

<div class="phero">
    <div class="phw-glow"></div>
    <div class="phero-floaters">
        <i class="fas fa-anchor"></i>
        <i class="fas fa-ship"></i>
        <i class="fas fa-water"></i>
        <i class="fas fa-crane"></i>
    </div>
    <div class="phw-container">
        <div class="phero-grid">
            <div class="phero-main">
                <div class="phero-badge"><i class="fas fa-images"></i> Galería Corporativa</div>
                <h1>Galería de Fotos</h1>
                <p>Memorias visuales de eventos institucionales y jornadas socioculturales</p>
            </div>
        </div>
    </div>
    <div class="phw-wave">
        <svg viewBox="0 0 1440 60" preserveAspectRatio="none"><path d="M0,32 C240,60 480,4 720,20 C960,36 1200,58 1440,28 L1440,60 L0,60 Z" fill="#f0f4f8"/></svg>
    </div>
</div>

<div class="intranet-shell">
    <div class="intranet-main">
        <div class="tab-content reveal">
            <div class="gallery-views">
                <div class="gallery-view active" id="gallery-albums-view">
                    <div id="gallery-container"></div>
                </div>
                <div class="gallery-view" id="gallery-detail-view">
                    <div class="gallery-detail-header">
                        <button class="btn-back" onclick="closeGalleryDetail()"><i class="fas fa-arrow-left"></i> Volver a álbumes</button>
                        <h2 id="gallery-detail-title"></h2>
                    </div>
                    <div class="gallery-detail-desc" id="gallery-detail-desc"></div>
                    <div class="gallery-detail-grid" id="gallery-detail-grid"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="pfooter">
    &copy; 2026 Sociedad Portuaria Mardique S.A. Intranet Corporativa &mdash; Todos los derechos reservados.
</div>

<script src="/js/msal-config.js"></script>
<script src="/js/intranet.js"></script>
<script>
document.addEventListener("DOMContentLoaded", function() {
    if (!isMsalAuthenticated()) { window.location.href = "/login"; return; }
    if (isMockMode()) { const mb = document.getElementById("mockBadge"); if (mb) mb.style.display = "inline-flex"; }

    getCurrentUser().then(user => {
        const name = user.displayName || user.userPrincipalName || "Empleado";
        document.getElementById("userDisplay").textContent = name;
        document.getElementById("userName").textContent = name;
        if (user.jobTitle) document.getElementById("userBadge").textContent = user.jobTitle;
    }).catch(() => {});

    loadGallery();

    const hdr = document.getElementById('intranet-header');
    window.addEventListener('scroll', () => hdr?.classList.toggle('scrolled', window.scrollY > 60), { passive: true });

    const revealObs = new IntersectionObserver(entries => {
        entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
    }, { threshold: 0.1 });
    document.querySelectorAll('.reveal').forEach(el => revealObs.observe(el));
});
</script>
</body>
</html>
