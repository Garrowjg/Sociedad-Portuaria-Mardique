<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrarse — Mardique</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/inicio.css">
    <style>
        :root {
            --primary-blue: #28648c;
            --primary-dark: #1b4562;
            --accent-gold: #f09a36;
            --accent-cyan: #00a3e0;
            --bg-light: #f5f7fa;
            --text-light: #ffffff;
            --text-muted: #94a3b8;
            --text-dark: #1e293b;
            --radius: 8px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg-light); color: var(--text-dark); min-height: 100vh; display: flex; flex-direction: column; }
        .auth-wrapper { flex: 1; display: flex; align-items: center; justify-content: center; padding: 140px 20px 60px; background: linear-gradient(135deg, var(--primary-dark) 0%, #0f2a3a 100%); position: relative; overflow: hidden; }
        .auth-wrapper::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(ellipse at 30% 20%, rgba(0,163,224,0.06) 0%, transparent 50%), radial-gradient(ellipse at 70% 80%, rgba(240,154,54,0.04) 0%, transparent 50%); pointer-events: none; }
        .auth-card { background: rgba(255,255,255,0.97); border-radius: 16px; padding: 48px 40px; width: 100%; max-width: 440px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); position: relative; }
        .auth-card-logo { text-align: center; margin-bottom: 28px; }
        .auth-card-logo img { height: 42px; }
        .auth-card h1 { font-size: 22px; font-weight: 700; text-align: center; margin-bottom: 4px; color: var(--primary-dark); }
        .auth-card .sub { text-align: center; color: var(--text-muted); font-size: 13px; margin-bottom: 28px; }
        .auth-card .field { margin-bottom: 18px; }
        .auth-card .field label { display: block; font-size: 12px; font-weight: 600; color: var(--text-dark); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.4px; }
        .auth-card .field input, .auth-card .field select { width: 100%; padding: 12px 16px; border-radius: var(--radius); border: 1px solid #d0d5dd; background: #fff; color: var(--text-dark); font-size: 14px; font-family: inherit; outline: none; transition: var(--transition); }
        .auth-card .field input:focus, .auth-card .field select:focus { border-color: var(--accent-gold); box-shadow: 0 0 0 3px rgba(240,154,54,0.1); }
        .auth-card .row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .auth-card .btn-submit { width: 100%; padding: 14px; border: none; border-radius: var(--radius); background: linear-gradient(135deg, var(--accent-gold), #d67e1a); color: #fff; font-size: 14px; font-weight: 700; font-family: inherit; cursor: pointer; transition: var(--transition); display: flex; align-items: center; justify-content: center; gap: 8px; }
        .auth-card .btn-submit:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(240,154,54,0.35); }
        .auth-card .auth-footer { text-align: center; margin-top: 20px; font-size: 13px; color: var(--text-muted); }
        .auth-card .auth-footer a { color: var(--accent-cyan); text-decoration: none; font-weight: 600; }
        .auth-card .auth-footer a:hover { text-decoration: underline; }
        .auth-card .msg { padding: 10px 14px; border-radius: var(--radius); font-size: 13px; margin-bottom: 16px; text-align: center; }
        .auth-card .msg-error { background: #fef2f2; border: 1px solid #fecaca; color: #dc2626; }
        .auth-card .msg-success { background: #f0fdf4; border: 1px solid #bbf7d0; color: #16a34a; }
        .auth-card .terms { font-size: 12px; color: var(--text-muted); text-align: center; margin-top: 16px; line-height: 1.5; }
        .auth-card .terms a { color: var(--accent-cyan); }
        .pw-checklist { list-style: none; padding: 6px 0 0; margin: 0; font-size: 11px; color: var(--text-muted); }
        .pw-checklist li { padding: 2px 0; display: flex; align-items: center; gap: 6px; }
        .pw-checklist li::before { content: '○'; font-size: 10px; color: var(--text-muted); }
        .pw-checklist li.valid::before { content: '✓'; color: #16a34a; }
        .pw-checklist li.valid { color: #16a34a; }
        .terms-wrap { text-align: center; margin-bottom: 14px; }
        .terms-wrap label { display: inline-flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text-muted); cursor: pointer; }
        .terms-wrap input { width: auto; accent-color: var(--accent-gold); }
        @media (max-width:500px) { .auth-card .row { grid-template-columns: 1fr; } .auth-card { padding: 32px 24px; } }
    </style>
    <style>body { animation: pageBlurIn 0.4s ease-out; } @keyframes pageBlurIn { from { filter: blur(4px); } to { filter: blur(0); } }</style>
<script src="/js/inicio.js"></script>
</head>
<body>
    <div th:replace="~{Inicio :: header}"></div>
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-card-logo">
                <img src="/images/Logo.png" alt="Mardique">
            </div>
            <h1>Crear Cuenta</h1>
            <p class="sub">Regístrese para acceder a los servicios</p>
            <div th:if="${error}" class="msg msg-error"><i class="fas fa-exclamation-circle"></i> <span th:text="${error}"></span></div>
            <div th:if="${success}" class="msg msg-success"><i class="fas fa-check-circle"></i> <span th:text="${success}"></span></div>
            <form th:action="@{/register}" method="post">
                <div class="row">
                    <div class="field">
                        <label for="nombres"><i class="fas fa-user" style="margin-right:4px;color:var(--accent-cyan);"></i> Nombres</label>
                        <input type="text" id="nombres" name="nombres" required placeholder="Sus nombres" th:value="${nombres != null ? nombres : ''}">
                    </div>
                    <div class="field">
                        <label for="apellidos"><i class="fas fa-user" style="margin-right:4px;color:var(--accent-cyan);"></i> Apellidos</label>
                        <input type="text" id="apellidos" name="apellidos" required placeholder="Sus apellidos" th:value="${apellidos != null ? apellidos : ''}">
                    </div>
                </div>
                <div class="field">
                    <label for="email"><i class="fas fa-envelope" style="margin-right:4px;color:var(--accent-cyan);"></i> Correo electrónico</label>
                    <input type="email" id="email" name="email" required placeholder="correo@ejemplo.com" th:value="${email != null ? email : ''}">
                </div>
                <div class="field">
                    <label for="username"><i class="fas fa-id-card" style="margin-right:4px;color:var(--accent-cyan);"></i> Nombre de usuario</label>
                    <input type="text" id="username" name="username" required placeholder="Cree un nombre de usuario" th:value="${username != null ? username : ''}">
                </div>
                <div class="row">
                    <div class="field">
                        <label for="password"><i class="fas fa-lock" style="margin-right:4px;color:var(--accent-cyan);"></i> Contraseña</label>
                        <input type="password" id="password" name="password" required placeholder="Mínimo 6 caracteres">
                        <ul class="pw-checklist" id="pwChecklist">
                            <li data-req="length">8+ caracteres</li>
                            <li data-req="upper">1 mayúscula</li>
                            <li data-req="number">1 número</li>
                            <li data-req="special">1 carácter especial</li>
                        </ul>
                    </div>
                    <div class="field">
                        <label for="confirmPassword"><i class="fas fa-lock" style="margin-right:4px;color:var(--accent-cyan);"></i> Confirmar</label>
                        <input type="password" id="confirmPassword" name="confirmPassword" required placeholder="Repita la contraseña">
                    </div>
                </div>
                <div class="field">
                    <label for="tipo"><i class="fas fa-user-tag" style="margin-right:4px;color:var(--accent-cyan);"></i> Tipo de cuenta</label>
                    <select id="tipo" name="tipo" onchange="toggleTipoFields()">
                        <option value="PERSONA" th:selected="${tipo == 'PERSONA'}">Persona Natural</option>
                        <option value="CLIENTE" th:selected="${tipo == 'CLIENTE'}">Cliente / Proveedor</option>
                        <option value="EMPRESA" th:selected="${tipo == 'EMPRESA'}">Empresa</option>
                    </select>
                </div>
                <div class="field" id="docField">
                    <label for="nit" id="docLabel"><i class="fas fa-id-card" style="margin-right:4px;color:var(--accent-cyan);"></i> Cédula</label>
                    <input type="text" id="nit" name="nit" required placeholder="CC-12345678" th:value="${nit != null ? nit : ''}">
                </div>
                <div class="field" id="categoriaField" style="display:none;">
                    <label for="categoria"><i class="fas fa-tag" style="margin-right:4px;color:var(--accent-cyan);"></i> Categoría <span style="color:var(--accent-gold)">*</span></label>
                    <select id="categoria" name="categoria">
                        <option value="" th:selected="${categoria == null or categoria == ''}">Seleccione...</option>
                        <option value="CLIENTE" th:selected="${categoria == 'CLIENTE'}">Cliente</option>
                        <option value="PROVEEDOR" th:selected="${categoria == 'PROVEEDOR'}">Proveedor</option>
                        <option value="AMBOS" th:selected="${categoria == 'AMBOS'}">Cliente y Proveedor</option>
                    </select>
                </div>
                <div class="field">
                    <label for="telefono"><i class="fas fa-phone" style="margin-right:4px;color:var(--accent-cyan);"></i> Teléfono (opcional)</label>
                    <input type="tel" id="telefono" name="telefono" placeholder="+57 300 000 0000" th:value="${telefono != null ? telefono : ''}">
                </div>
                <div class="terms-wrap">
                    <label>
                        <input type="checkbox" name="aceptaTerminos" required>
                        <span>Acepto los <a href="#" style="color:var(--accent-cyan);text-decoration:none;">Términos y Condiciones</a> y la <a href="#" style="color:var(--accent-cyan);text-decoration:none;">Política de Privacidad</a>.</span>
                    </label>
                </div>
                <button type="submit" class="btn-submit"><i class="fas fa-user-plus"></i> CREAR CUENTA</button>
                <script>
                    document.addEventListener('DOMContentLoaded', function() {
                        document.getElementById('password').addEventListener('input', function() {
                            var v = this.value;
                            document.querySelectorAll('#pwChecklist li').forEach(function(li) {
                                var req = li.getAttribute('data-req');
                                var valid = false;
                                if (req === 'length') valid = v.length >= 8;
                                else if (req === 'upper') valid = /[A-Z]/.test(v);
                                else if (req === 'number') valid = /[0-9]/.test(v);
                                else if (req === 'special') valid = /[^A-Za-z0-9]/.test(v);
                                li.classList.toggle('valid', valid);
                            });
                        });
                    });
                    function toggleTipoFields() {
                        var t = document.getElementById('tipo').value;
                        var docLabel = document.getElementById('docLabel');
                        var docInput = document.getElementById('nit');
                        var catField = document.getElementById('categoriaField');
                        var catSelect = document.getElementById('categoria');
                        if (t === 'EMPRESA') {
                            docLabel.innerHTML = '<i class="fas fa-building" style="margin-right:4px;color:var(--accent-cyan);"></i> NIT <span style="color:var(--accent-gold)">*</span>';
                            docInput.placeholder = 'NIT-123456789-1';
                            catField.style.display = 'none';
                            catSelect.required = false;
                        } else if (t === 'CLIENTE') {
                            docLabel.innerHTML = '<i class="fas fa-id-card" style="margin-right:4px;color:var(--accent-cyan);"></i> Documento del Representante Legal <span style="color:var(--accent-gold)">*</span>';
                            docInput.placeholder = 'CC-12345678';
                            catField.style.display = 'block';
                            catSelect.required = true;
                        } else {
                            docLabel.innerHTML = '<i class="fas fa-id-card" style="margin-right:4px;color:var(--accent-cyan);"></i> Cédula <span style="color:var(--accent-gold)">*</span>';
                            docInput.placeholder = 'CC-12345678';
                            catField.style.display = 'none';
                            catSelect.required = false;
                        }
                    }
                </script>
            </form>
            <div class="auth-footer">¿Ya tiene cuenta? <a href="/login">Inicie sesión</a></div>
        </div>
    </div>
    <div th:replace="~{Inicio :: footer}"></div>
    <div class="drawer-overlay" id="drawerOverlay"></div>
    <nav class="mobile-nav-drawer" id="mobileDrawer" aria-label="Men&uacute; m&oacute;vil">
        <div class="drawer-header">
            <img src="/images/Logo.png" alt="Mardique">
            <button class="drawer-close" id="drawerClose" aria-label="Cerrar men&uacute;">&times;</button>
        </div>
        <div class="drawer-nav">
            <a href="/inicio">INICIO</a>
            <a href="/empresa">EMPRESA</a>
            <a href="/servicios">SERVICIOS</a>
            <div class="drawer-divider"></div>
            <button class="drawer-item" id="drawerServCliente">SERVICIO AL CLIENTE <i class="fas fa-chevron-down drawer-chevron"></i></button>
            <div class="drawer-submenu" id="subServCliente">
                <a href="/tramites-en-linea">TR&Aacute;MITES EN L&Iacute;NEA</a>
                <a href="/procedimientos">PROCEDIMIENTOS</a>
                <a href="/tarifas">TARIFAS</a>
            </div>
            <a href="/contacto">CONTACTO</a>
            <a href="/galeria">GALER&Iacute;A</a>
            <div class="drawer-divider"></div>
            <button class="drawer-item" id="drawerAcceso">ACCESO <i class="fas fa-chevron-down drawer-chevron"></i></button>
            <div class="drawer-submenu" id="subAcceso">
                <a href="/login">INICIAR SESI&Oacute;N</a>
                <a href="/register">REGISTRARSE</a>
            </div>
            <a href="/contacto" class="drawer-contact-btn"><i class="fas fa-phone-alt"></i> CONT&Aacute;CTANOS</a>
        </div>
    </nav>
    <script>window.addEventListener('scroll',()=>{document.getElementById('main-header')?.classList.toggle('scrolled',window.scrollY>60);});</script>
</body>
</html>
