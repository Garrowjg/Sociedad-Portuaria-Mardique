<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Áreas — Intranet Mardique</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/panel-nav.css">
    <link rel="stylesheet" href="/css/inicio.css">
    <link rel="stylesheet" href="/css/portal.css">
    <script src="https://alcdn.msauth.net/browser/2.38.0/js/msal-browser.min.js"></script>
    <style>
        .intranet-toast { display: none; position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); padding: 12px 24px; border-radius: var(--r); font-size: 13px; font-weight: 600; z-index: 9999; box-shadow: 0 8px 32px rgba(0,0,0,.15); max-width: 90%; text-align: center; }
        .intranet-toast.success { background: #16a34a; color: #fff; }
        @keyframes fadeInDown{from{opacity:0;transform:translateY(-24px)}to{opacity:1;transform:translateY(0)}}
        @keyframes fadeInUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
        @keyframes floatIcon{0%,100%{transform:translateY(0)}25%{transform:translateY(-12px)}75%{transform:translateY(-8px)}}
        .phero-badge{animation:fadeInDown .6s ease both}
        .phero-main h1{animation:fadeInUp .7s ease .1s both}
        .phero-main p{animation:fadeInUp .7s ease .25s both}
        .phero-floaters{position:absolute;inset:0;overflow:hidden;pointer-events:none;z-index:0}
        .phero-floaters i{position:absolute;color:rgba(255,255,255,.08);animation:floatIcon 9s ease-in-out infinite}
        .phero-floaters i:nth-child(1){font-size:60px;top:14%;left:6%;animation-delay:0s}
        .phero-floaters i:nth-child(2){font-size:40px;top:62%;left:14%;animation-delay:1.4s}
        .phero-floaters i:nth-child(3){font-size:48px;top:20%;right:8%;animation-delay:.7s}
        .phero-floaters i:nth-child(4){font-size:36px;bottom:12%;right:16%;animation-delay:2.1s}
        body{background:#f3f4f6!important;}
        .intranet-shell{max-width:1320px;margin:0 auto;padding:0 24px 90px;display:flex;flex-direction:column;gap:22px;}
        .intranet-main{flex:1;min-width:0;}
        body .section-header{margin-bottom:24px;padding-bottom:16px;border-bottom:2px solid #eef1f4;}
        body .section-header h2{display:flex;align-items:center;gap:10px;font-size:19px;font-weight:800;color:var(--pd);margin:0;letter-spacing:-.2px;}
        body .section-header h2 i{color:var(--ag);font-size:17px;width:34px;height:34px;flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;background:rgba(240,154,54,.12);border-radius:9px;}
        body .section-header p{margin-top:6px!important;}
        body .tab-content{background:#fff;border:1px solid var(--bdr);border-radius:16px;padding:34px 36px;box-shadow:0 4px 22px rgba(15,42,58,.06);}
        @media(max-width:700px){ body .tab-content{padding:22px 18px;} }
        body .doc-breadcrumb{font-size:12.5px;color:var(--mx);margin-bottom:16px;font-weight:600;}
        .areas-views { position: relative; }
        .areas-view { display: none; }
        .areas-view.active { display: block; }
        .areas-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr)); gap: 20px; }
        .area-card { background: #fff; border: 1px solid var(--bdr); border-radius: 14px; overflow: hidden; cursor: pointer; transition: transform .25s ease, box-shadow .25s ease; }
        .area-card:hover { transform: translateY(-4px); box-shadow: 0 14px 32px rgba(15,42,58,.12); border-color: rgba(240,154,54,.4); }
        .area-card-banner { height: 140px; overflow: hidden; background: var(--bg); position: relative; }
        .area-card-banner img { width: 100%; height: 100%; object-fit: cover; transition: transform .4s ease; }
        .area-card:hover .area-card-banner img { transform: scale(1.06); }
        .area-card-body { padding: 18px; }
        .area-card-body h3 { font-size: 15.5px; font-weight: 800; color: var(--pd); margin: 0 0 5px; }
        .area-card-body p { font-size: 12.5px; color: var(--mx); line-height: 1.55; margin: 0 0 12px; min-height: 38px; }
        .area-card-count { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 700; color: var(--ag); text-transform: uppercase; letter-spacing: .3px; padding-top: 10px; border-top: 1px solid #f1f3f5; width: 100%; }
        .area-detail-header { display: flex; align-items: center; gap: 12px; margin-bottom: 4px; }
        .area-detail-header .btn-back { display: inline-flex; align-items: center; gap: 6px; padding: 8px 18px; border: 2px solid var(--bdr); border-radius: var(--r); font-size: 12px; font-weight: 700; font-family: inherit; background: #fff; color: var(--tx); cursor: pointer; transition: all .25s ease; }
        .area-detail-header .btn-back:hover { border-color: var(--ag); color: var(--ag); }
        .area-hero { display: flex; gap: 28px; align-items: center; flex-wrap: wrap; margin: 20px 0 32px; padding-bottom: 28px; border-bottom: 1px solid #eef1f4; }
        .area-hero-img { width: 340px; max-width: 100%; height: 190px; border-radius: 14px; overflow: hidden; background: var(--bg); flex-shrink: 0; box-shadow: 0 8px 24px rgba(15,42,58,.1); }
        .area-hero-img img { width: 100%; height: 100%; object-fit: cover; }
        .area-hero-text h2 { font-family: Georgia, 'Times New Roman', serif; font-style: italic; font-size: 27px; font-weight: 700; color: var(--pd); margin: 0 0 8px; line-height: 1.2; }
        .area-hero-text p { font-size: 13.5px; color: var(--mx); max-width: 460px; line-height: 1.65; }
        .area-detail-grid { display: grid; grid-template-columns: 1.1fr 1fr 1fr; gap: 36px; }
        .area-col h4 { font-size: 13px; font-weight: 800; color: var(--pd); text-transform: uppercase; letter-spacing: .4px; margin: 0 0 16px; padding-bottom: 10px; border-bottom: 2px solid rgba(240,154,54,.25); }
        .area-site-card { border: 1px solid var(--bdr); border-radius: 12px; overflow: hidden; box-shadow: 0 2px 10px rgba(0,0,0,.04); }
        .area-site-card-top { background: var(--pd); color: #fff; padding: 8px 12px; display: flex; align-items: center; justify-content: space-between; font-size: 11px; font-weight: 800; }
        .area-site-card-body { padding: 12px; }
        .area-site-card-body strong { display: block; font-size: 13px; color: var(--tx); margin-bottom: 8px; }
        .area-site-card-meta { font-size: 11px; color: var(--mx); display: flex; align-items: center; gap: 6px; }
        .area-contact-group { margin-bottom: 20px; }
        .area-contact-label { font-size: 11px; font-weight: 700; color: var(--mx); text-transform: uppercase; letter-spacing: .4px; margin-bottom: 8px; }
        .area-contact { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; cursor: pointer; }
        .area-contact:hover .area-contact-avatar { transform: scale(1.06); }
        .area-contact-avatar { transition: transform .2s ease; }
        .area-contact-avatar { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, var(--pd), var(--pb)); color: #fff; font-size: 13px; font-weight: 800; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .area-contact-info strong { display: block; font-size: 12.5px; color: var(--tx); font-weight: 700; }
        .area-contact-info span { font-size: 11px; color: var(--mx); }
        @media(max-width: 900px){ .area-detail-grid{ grid-template-columns: 1fr; gap: 24px; } .area-hero-img{ width: 100%; } }
        .intranet-loading{display:flex;align-items:center;justify-content:center;gap:10px;padding:48px 20px;color:var(--mx);font-size:13px;font-weight:600;}
        .intranet-loading i{font-size:18px;}
        body .empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:48px 20px;color:var(--mx);background:#f9fafb;border:1px dashed var(--bdr);border-radius:12px;}
        body .empty-state i{font-size:30px;margin-bottom:12px;opacity:.5;color:var(--pd);}
        body .empty-state span{font-size:12.5px;font-weight:600;}
        body .empty-state p{font-size:12.5px;font-weight:600;margin:0;}
        .mock-mode-badge { display: inline-flex; align-items: center; gap: 5px; padding: 4px 14px; border-radius: 50px; font-size: 11px; font-weight: 700; background: #fef3c7; color: #92400e; border: 1px solid #f59e0b; margin-left: 10px; }
        .user-greeting{font-size:15px;color:rgba(255,255,255,.75);margin-top:4px;}
        .user-badge{display:inline-block;padding:3px 12px;border-radius:50px;font-size:11px;font-weight:700;background:rgba(240,154,54,.14);color:var(--ag);border:1px solid rgba(240,154,54,.3);margin-top:8px;}
        @media(max-width:768px){ .header-user-name{display:none;} }
    </style>
</head>
<body>

<div id="intranet-toast" class="intranet-toast"></div>

<div th:replace="IntranetNav :: nav(current='areas')"></div>

<div class="phero">
    <div class="phw-glow"></div>
    <div class="phero-floaters">
        <i class="fas fa-anchor"></i>
        <i class="fas fa-ship"></i>
        <i class="fas fa-water"></i>
        <i class="fas fa-crane"></i>
    </div>
    <div class="phw-container">
        <div class="phero-grid">
            <div class="phero-main">
                <div class="phero-badge"><i class="fas fa-layer-group"></i> Directorio</div>
                <h1>Áreas / Sectores</h1>
                <p>Directorio de áreas de la empresa, contactos y accesos rápidos</p>
            </div>
        </div>
    </div>
    <div class="phw-wave">
        <svg viewBox="0 0 1440 60" preserveAspectRatio="none"><path d="M0,32 C240,60 480,4 720,20 C960,36 1200,58 1440,28 L1440,60 L0,60 Z" fill="#f0f4f8"/></svg>
    </div>
</div>

<div class="intranet-shell">
    <div class="intranet-main">
        <div class="tab-content reveal">
            <div class="areas-views">
                <div class="areas-view active" id="areas-list-view">
                    <div class="areas-grid" id="areas-container"></div>
                </div>
                <div class="areas-view" id="areas-detail-view">
                    <div class="area-detail-header">
                        <button class="btn-back" onclick="closeAreaDetail()"><i class="fas fa-arrow-left"></i> Volver a áreas</button>
                    </div>
                    <div class="area-hero">
                        <div class="area-hero-img"><img id="area-detail-img" src="" alt=""></div>
                        <div class="area-hero-text">
                            <h2 id="area-detail-title"></h2>
                            <p id="area-detail-desc"></p>
                        </div>
                    </div>
                    <div class="area-detail-grid">
                        <div class="area-col">
                            <h4>Sitio de Sistema</h4>
                            <div id="area-detail-site"></div>
                        </div>
                        <div class="area-col">
                            <h4>Contactos</h4>
                            <div id="area-detail-contacts"></div>
                        </div>
                        <div class="area-col">
                            <h4>Vínculos rápidos</h4>
                            <div id="area-detail-links"></div>
                        </div>
                    </div>
                    <div id="area-detail-informe" style="margin-top:28px;padding-top:28px;border-top:1px solid #eef1f4;"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="pfooter">
    &copy; 2026 Sociedad Portuaria Mardique S.A. Intranet Corporativa &mdash; Todos los derechos reservados.
</div>

<style>
.area-link-item{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--ac);word-break:break-all;text-decoration:none;padding:10px 14px;border-radius:10px;border:1px solid #eef1f4;transition:all .2s;}
.area-link-item i{color:var(--mx);font-size:12px;flex-shrink:0;}
.area-link-item:hover{border-color:var(--ag);background:rgba(240,154,54,.04);color:var(--ag);}
.area-link-item:hover i{color:var(--ag);}
.area-actividad{font-size:12px;color:var(--mx);padding:6px 0;display:flex;align-items:center;gap:8px;}
.area-actividad i{color:var(--ag);font-size:10px;width:14px;flex-shrink:0;}

</style>

<script src="/js/msal-config.js"></script>
<script src="/js/api-service.js"></script>
<script src="/js/intranet.js"></script>
<script>
let loadedAreas = [];

const DEFAULT_LINKS = [
    { texto: "mardique360.spmardique.com", url: "https://mardique360.spmardique.com" },
    { texto: "mardique.up.railway.app", url: "https://mardique.up.railway.app" },
    { texto: "helpdesk.agmdesarrollos.com", url: "https://helpdesk.agmdesarrollos.com" }
];

function initials(name){
    return name.split(" ").filter(Boolean).slice(0,2).map(w => w[0]).join("").toUpperCase();
}

function parseContactos(text){
    if (!text) return [];
    return text.split("\n").filter(Boolean).map(line => {
        const parts = line.split(" - ");
        return { nombre: parts[0]?.trim() || line, cargo: parts[1]?.trim() || "" };
    });
}

function renderAreas(areas){
    const cont = document.getElementById("areas-container");
    if (!cont) return;
    if (!areas || !areas.length) {
        cont.innerHTML = '<div class="empty-state"><i class="fas fa-layer-group"></i><span>No hay áreas disponibles</span></div>';
        return;
    }
    loadedAreas = areas;
    cont.innerHTML = areas.map(a => {
        const contactos = parseContactos(a.Contactos);
        const coverSrc = a.cover || '';
        return `
        <div class="area-card" onclick="openAreaDetail('${a.id}')">
            <div class="area-card-banner">
                ${coverSrc ? '<img src="' + coverSrc.replace(/&/g,"&amp;") + '" alt="" loading="lazy">' : '<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1b4562,#26597e);font-size:40px;color:rgba(255,255,255,.15);"><i class="fas fa-building"></i></div>'}
            </div>
            <div class="area-card-body">
                <h3>${escapeHtml(a.Title)}</h3>
                <p>${escapeHtml(a.descripcion_larga || 'Sin descripción')}</p>
                <div class="area-card-count"><i class="fas fa-users"></i> ${contactos.length} contactos</div>
            </div>
        </div>`;
    }).join("");
}

function openAreaDetail(id){
    const area = loadedAreas.find(a => a.id === id);
    if (!area) return;
    document.getElementById("areas-list-view").classList.remove("active");
    document.getElementById("areas-detail-view").classList.add("active");
    const imgEl = document.getElementById("area-detail-img");
    if (area.cover) {
        imgEl.src = area.cover;
        imgEl.style.display = "block";
        imgEl.alt = area.Title;
    } else {
        imgEl.style.display = "none";
    }
    document.getElementById("area-detail-title").textContent = area.Title;
    document.getElementById("area-detail-desc").textContent = area.descripcion_larga || "";

    const contactos = parseContactos(area.Contactos);

    const sitioUrl = area.Sitio && area.Sitio !== "..." ? area.Sitio : "";
    document.getElementById("area-detail-site").innerHTML = `
    <div class="area-site-card">
        <div class="area-site-card-top"><i class="fas fa-link"></i> Sitio del área</div>
        <div class="area-site-card-body">
            ${sitioUrl ? '<a href="' + sitioUrl.replace(/&/g,"&amp;") + '" target="_blank" rel="noopener" style="font-size:13px;color:var(--ac);text-decoration:none;font-weight:600;word-break:break-all;"><i class="fas fa-external-link-alt"></i> ' + escapeHtml(sitioUrl) + '</a>' : '<span style="color:var(--mx);font-size:12px;">Sin sitio asignado</span>'}
            <div style="margin-top:14px;border-top:1px solid #eef1f4;padding-top:12px;">
                <div style="font-size:11px;font-weight:700;color:var(--mx);text-transform:uppercase;margin-bottom:10px;">Actividad reciente</div>
                <div class="area-actividad"><i class="fas fa-file-alt"></i> Ha modificado documentos del área</div>
                <div class="area-actividad"><i class="fas fa-clock-rotate-left"></i> Última actualización: recientemente</div>
            </div>
        </div>
    </div>`;

    document.getElementById("area-detail-contacts").innerHTML = contactos.map(p => `
    <div class="area-contact">
        <div class="area-contact-avatar">${initials(p.nombre)}</div>
        <div class="area-contact-info">
            <strong>${escapeHtml(p.nombre)}</strong>
            <span>${escapeHtml(p.cargo)}</span>
        </div>
    </div>
    `).join("") || '<div style="color:var(--mx);font-size:12px;">Sin contactos registrados</div>';

    document.getElementById("area-detail-links").innerHTML = DEFAULT_LINKS.map(l => `
    <a href="${l.url}" target="_blank" rel="noopener" class="area-link-item"><i class="fas fa-globe"></i> ${escapeHtml(l.texto)}</a>
    `).join("");

    const informeEl = document.getElementById("area-detail-informe");
    if (area.Informe) {
        informeEl.innerHTML = '<h4 style="font-size:13px;font-weight:800;color:var(--pd);text-transform:uppercase;letter-spacing:.4px;margin:0 0 16px;padding-bottom:10px;border-bottom:2px solid rgba(240,154,54,.25);"><i class="fas fa-chart-pie"></i> Informe / Dashboard</h4><div class="area-informe-wrap" style="border-radius:12px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.06);">' + area.Informe + '</div>';
        informeEl.style.display = "block";
    } else {
        informeEl.style.display = "none";
    }

}

function closeAreaDetail(){
    document.getElementById("areas-detail-view").classList.remove("active");
    document.getElementById("areas-list-view").classList.add("active");
}

function loadAreas(){
    const cont = document.getElementById("areas-container");
    if (!cont) return;
    cont.innerHTML = '<div class="intranet-loading"><i class="fas fa-spinner fa-spin"></i><span>Cargando áreas...</span></div>';
    getAreas().then(areas => {
        renderAreas(areas);
    }).catch(err => {
        cont.innerHTML = '<div class="empty-state error"><i class="fas fa-exclamation-triangle"></i><p>Error al cargar: ' + err.message + '</p></div>';
    });
}

document.addEventListener("DOMContentLoaded", function() {
    if (!isMsalAuthenticated()) { window.location.href = "/login"; return; }
    if (isMockMode()) { const mb = document.getElementById("mockBadge"); if (mb) mb.style.display = "inline-flex"; }

    getCurrentUser().then(user => {
        const name = user.displayName || user.userPrincipalName || "Empleado";
        document.getElementById("userDisplay").textContent = name;
        document.getElementById("userName").textContent = name;
        if (user.jobTitle) document.getElementById("userBadge").textContent = user.jobTitle;
    }).catch(() => {});

    loadAreas();

    const hdr = document.getElementById('intranet-header');
    window.addEventListener('scroll', () => hdr?.classList.toggle('scrolled', window.scrollY > 60), { passive: true });

    const revealObs = new IntersectionObserver(entries => {
        entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
    }, { threshold: 0.1 });
    document.querySelectorAll('.reveal').forEach(el => revealObs.observe(el));
});
</script>
</body>
</html>
