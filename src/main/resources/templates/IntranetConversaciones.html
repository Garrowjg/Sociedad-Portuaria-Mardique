<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversaciones — Intranet Mardique</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/panel-nav.css">
    <link rel="stylesheet" href="/css/inicio.css">
    <link rel="stylesheet" href="/css/portal.css">
    <script src="https://alcdn.msauth.net/browser/2.38.0/js/msal-browser.min.js"></script>
    <style>
        @keyframes fadeInDown{from{opacity:0;transform:translateY(-24px)}to{opacity:1;transform:translateY(0)}}
        @keyframes fadeInUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
        @keyframes floatIcon{0%,100%{transform:translateY(0)}25%{transform:translateY(-12px)}75%{transform:translateY(-8px)}}
        .phero-badge{animation:fadeInDown .6s ease both}
        .phero-main h1{animation:fadeInUp .7s ease .1s both}
        .phero-main p{animation:fadeInUp .7s ease .25s both}
        .phero-floaters{position:absolute;inset:0;overflow:hidden;pointer-events:none;z-index:0}
        .phero-floaters i{position:absolute;color:rgba(255,255,255,.08);animation:floatIcon 9s ease-in-out infinite}
        .phero-floaters i:nth-child(1){font-size:60px;top:14%;left:6%;animation-delay:0s}
        .phero-floaters i:nth-child(2){font-size:40px;top:62%;left:14%;animation-delay:1.4s}
        .phero-floaters i:nth-child(3){font-size:48px;top:20%;right:8%;animation-delay:.7s}
        .phero-floaters i:nth-child(4){font-size:36px;bottom:12%;right:16%;animation-delay:2.1s}
        body{background:#f3f4f6!important;}
        .intranet-shell{max-width:1320px;margin:0 auto;padding:0 24px 90px;display:flex;flex-direction:column;gap:22px;}
        .intranet-main{flex:1;min-width:0;}
        body .section-header{margin-bottom:24px;padding-bottom:16px;border-bottom:2px solid #eef1f4;}
        body .section-header h2{display:flex;align-items:center;gap:10px;font-size:19px;font-weight:800;color:var(--pd);margin:0;letter-spacing:-.2px;}
        body .section-header h2 i{color:var(--ag);font-size:17px;width:34px;height:34px;flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;background:rgba(240,154,54,.12);border-radius:9px;}
        body .section-header p{margin-top:6px!important;}
        body .tab-content{background:#fff;border:1px solid var(--bdr);border-radius:16px;padding:34px 36px;box-shadow:0 4px 22px rgba(15,42,58,.06);}
        @media(max-width:700px){ body .tab-content{padding:22px 18px;} }
        .conv-banners { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; border-radius: 14px; overflow: hidden; margin-bottom: 28px; box-shadow: 0 8px 26px rgba(15,42,58,.1); }
        .conv-banner { position: relative; height: 220px; overflow: hidden; }
        .conv-banner img { width: 100%; height: 100%; object-fit: cover; }
        .conv-banner-label { position: absolute; left: 0; bottom: 0; right: 0; padding: 16px; background: linear-gradient(transparent, rgba(0,0,0,.65)); color: #fff; font-size: 16px; font-weight: 700; }
        @media(max-width: 700px){ .conv-banners{ grid-template-columns: 1fr; } }
        .conv-composer { background: #fbfbfc; border: 1px solid var(--bdr); border-radius: 14px; padding: 18px; margin-bottom: 22px; }
        .conv-composer-top { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
        .conv-composer-top input { flex: 1; border: 1px solid var(--bdr); border-radius: 50px; padding: 10px 16px; font-size: 12.5px; font-family: inherit; }
        .conv-composer-types { display: flex; gap: 8px; flex-wrap: wrap; }
        .conv-type-btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: 8px; font-size: 12px; font-weight: 700; border: none; cursor: pointer; font-family: inherit; background: #f1f5f9; color: var(--tx); }
        .conv-type-btn.active { background: var(--ag); color: #fff; }
        .conv-post { background: #fff; border: 1px solid var(--bdr); border-radius: 14px; padding: 18px; margin-bottom: 16px; box-shadow: 0 2px 10px rgba(0,0,0,.03); }
        .conv-post-head { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .conv-post-avatar { width: 38px; height: 38px; border-radius: 50%; background: linear-gradient(135deg, var(--pd), var(--pb)); color: #fff; font-size: 13px; font-weight: 800; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .conv-post-head strong { font-size: 13px; color: var(--tx); display: block; }
        .conv-post-head span { font-size: 11px; color: var(--mx); }
        .conv-post-text { font-size: 13.5px; color: var(--tx); line-height: 1.6; margin-bottom: 12px; }
        .conv-post-actions { display: flex; gap: 20px; padding-top: 10px; border-top: 1px solid var(--bdr); }
        .conv-post-actions button { background: none; border: none; font-family: inherit; font-size: 12px; font-weight: 600; color: var(--mx); cursor: pointer; display: inline-flex; align-items: center; gap: 6px; }
        .conv-post-actions button:hover { color: var(--ag); }
        .conv-post-empty { text-align: center; padding: 24px; color: var(--mx); font-size: 12.5px; }
        .mock-mode-badge { display: inline-flex; align-items: center; gap: 5px; padding: 4px 14px; border-radius: 50px; font-size: 11px; font-weight: 700; background: #fef3c7; color: #92400e; border: 1px solid #f59e0b; margin-left: 10px; }
        .user-greeting{font-size:15px;color:rgba(255,255,255,.75);margin-top:4px;}
        .user-badge{display:inline-block;padding:3px 12px;border-radius:50px;font-size:11px;font-weight:700;background:rgba(240,154,54,.14);color:var(--ag);border:1px solid rgba(240,154,54,.3);margin-top:8px;}
        @media(max-width:768px){ .header-user-name{display:none;} }
    </style>
</head>
<body>

<div th:replace="IntranetNav :: nav(current='conversaciones')"></div>

<div class="phero">
    <div class="phw-glow"></div>
    <div class="phero-floaters">
        <i class="fas fa-anchor"></i>
        <i class="fas fa-ship"></i>
        <i class="fas fa-water"></i>
        <i class="fas fa-crane"></i>
    </div>
    <div class="phw-container">
        <div class="phero-grid">
            <div class="phero-main">
                <div class="phero-badge"><i class="fas fa-comments"></i> Foro Colaborativo</div>
                <h1>Conversaciones</h1>
                <p>Espacio de comunicación interna y foros colaborativos</p>
            </div>
        </div>
    </div>
    <div class="phw-wave">
        <svg viewBox="0 0 1440 60" preserveAspectRatio="none"><path d="M0,32 C240,60 480,4 720,20 C960,36 1200,58 1440,28 L1440,60 L0,60 Z" fill="#f0f4f8"/></svg>
    </div>
</div>

<div class="intranet-shell">
    <div class="intranet-main">
        <div class="tab-content reveal">
            <div class="conv-banners">
                <div class="conv-banner"><img src="https://images.unsplash.com/photo-1605281317010-fe5ffe798166?w=700&q=80" alt="Nuevos proyectos"><div class="conv-banner-label">Nuevos proyectos en Mardique</div></div>
                <div class="conv-banner"><img src="https://images.unsplash.com/photo-1494412651409-8963ce7935a7?w=700&q=80" alt="Operación de Maíz"><div class="conv-banner-label">Operación de Maíz</div></div>
            </div>

            <div class="conv-composer">
                <div class="conv-composer-top">
                    <div class="conv-post-avatar" id="conv-my-avatar">JG</div>
                    <input type="text" id="conv-input" placeholder="Compartir ideas o actualizaciones...">
                </div>
                <div class="conv-composer-types">
                    <button class="conv-type-btn active" data-type="Discusión"><i class="fas fa-comment-dots"></i> Discusión</button>
                    <button class="conv-type-btn" data-type="Pregunta"><i class="fas fa-circle-question"></i> Pregunta</button>
                    <button class="conv-type-btn" data-type="Elogio"><i class="fas fa-award"></i> Elogio</button>
                    <button class="conv-type-btn" data-type="Sondeo"><i class="fas fa-square-poll-vertical"></i> Sondeo</button>
                    <button class="btn btn-gold" style="margin-left:auto;padding:7px 16px;font-size:12px;" onclick="publishConversation()"><i class="fas fa-paper-plane"></i> Publicar</button>
                </div>
            </div>

            <div id="conversations-container"></div>
        </div>
    </div>
</div>

<div class="pfooter">
    &copy; 2026 Sociedad Portuaria Mardique S.A. Intranet Corporativa &mdash; Todos los derechos reservados.
</div>

<script src="/js/msal-config.js"></script>
<script src="/js/api-service.js"></script>
<script src="/js/intranet.js"></script>
<script>
let activeConversationType = "Discusión";

function initials(name){
    return name.split(" ").filter(Boolean).slice(0,2).map(w => w[0]).join("").toUpperCase();
}

function renderConversations(items){
    const cont = document.getElementById("conversations-container");
    if (!cont) return;
    if (!items || !items.length) {
        cont.innerHTML = `<div class="conv-post-empty"><i class="fas fa-comments" style="font-size:28px;opacity:.4;margin-bottom:10px;display:block;"></i><strong>¡Fantástico!</strong><br>Buen trabajo para iniciar la conversación.</div>`;
        return;
    }
    cont.innerHTML = items.map(p => `
    <div class="conv-post">
        <div class="conv-post-head">
            <div class="conv-post-avatar">${initials(p.author)}</div>
            <div><strong>${escapeHtml(p.author)}</strong><span>${p.time}</span></div>
        </div>
        <div class="conv-post-text">${escapeHtml(p.text)}</div>
        <div class="conv-post-actions">
            <button><i class="fas fa-thumbs-up"></i> Me gusta ${p.likes ? '(' + p.likes + ')' : ''}</button>
            <button><i class="fas fa-comment"></i> Comentar ${p.comments ? '(' + p.comments + ')' : ''}</button>
        </div>
    </div>`).join("");
}

async function publishConversation(){
    const input = document.getElementById("conv-input");
    const text = input.value.trim();
    if (!text) return;
    const name = document.getElementById("userName") ? document.getElementById("userName").textContent : "Empleado";
    try {
        await submitConversation({ author: name, text, type: activeConversationType });
        input.value = "";
        loadConversations();
        showIntranetToast("Mensaje publicado correctamente", "success");
    } catch (err) {
        showIntranetError("Error al publicar: " + err.message);
    }
}

function loadConversations(){
    const cont = document.getElementById("conversations-container");
    if (!cont) return;
    cont.innerHTML = '<div class="conv-post-empty"><i class="fas fa-spinner fa-spin" style="font-size:20px;margin-bottom:8px;display:block;"></i>Cargando conversaciones...</div>';
    getConversations().then(items => {
        const mapped = items.map(item => {
            const f = item.fields || item;
            return {
                author: f.AuthorName || f.author || "Empleado",
                time: f.time || (f.Created ? formatDate(f.Created) : "recientemente"),
                text: f.Message || f.text || f.Title || "",
                likes: f.likes || 0,
                comments: f.comments || 0,
                type: f.Type || f.type || "Discusión"
            };
        });
        renderConversations(mapped);
    }).catch(err => {
        cont.innerHTML = '<div class="conv-post-empty"><i class="fas fa-exclamation-triangle" style="font-size:20px;color:#dc2626;margin-bottom:8px;display:block;"></i>Error al cargar: ' + err.message + '</div>';
    });
}

document.addEventListener("DOMContentLoaded", function() {
    if (!isMsalAuthenticated()) { window.location.href = "/login"; return; }
    if (isMockMode()) { const mb = document.getElementById("mockBadge"); if (mb) mb.style.display = "inline-flex"; }

    getCurrentUser().then(user => {
        const name = user.displayName || user.userPrincipalName || "Empleado";
        document.getElementById("userDisplay").textContent = name;
        document.getElementById("userName").textContent = name;
        if (user.jobTitle) document.getElementById("userBadge").textContent = user.jobTitle;
        const convAvatar = document.getElementById("conv-my-avatar");
        if (convAvatar) convAvatar.textContent = initials(name);
    }).catch(() => {});

    loadConversations();

    document.querySelectorAll(".conv-type-btn").forEach(btn => {
        btn.addEventListener("click", function(){
            document.querySelectorAll(".conv-type-btn").forEach(b => b.classList.remove("active"));
            this.classList.add("active");
            activeConversationType = this.dataset.type;
        });
    });

    document.getElementById("conv-input")?.addEventListener("keydown", function(e) {
        if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); publishConversation(); }
    });

    const hdr = document.getElementById('intranet-header');
    window.addEventListener('scroll', () => hdr?.classList.toggle('scrolled', window.scrollY > 60), { passive: true });

    const revealObs = new IntersectionObserver(entries => {
        entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
    }, { threshold: 0.1 });
    document.querySelectorAll('.reveal').forEach(el => revealObs.observe(el));
});
</script>
</body>
</html>
